<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NPC編集 | 忘却の取引</title>
</head>
<body>
    <h1 th:text="${npcForm.id} != null ? 'NPC編集' : 'NPC新規作成'"></h1>
    <form th:action="${npcForm.id} != null ? @{/admin/npcs/{id}(id=${npcForm.id})} : @{/admin/npcs}"
          th:object="${npcForm}" method="post">
        <div>
            <label>名前 <input type="text" th:field="*{name}"></label>
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>
        <div>
            <label>役割(NPCタイプ) <input type="text" th:field="*{role}"></label>
        </div>
        <div>
            <label>立ち絵ラベル <input type="text" th:field="*{portraitLabel}"></label>
        </div>
        <div>
            <label>弱点タグ(好むタグ)
                <select th:field="*{weakTag}">
                    <option value="">(選択してください)</option>
                    <option th:each="tag : ${T(com.example.demo.entity.EmotionTag).values()}" th:value="${tag}" th:text="${tag}"></option>
                </select>
            </label>
            <p th:if="${#fields.hasErrors('weakTag')}" th:errors="*{weakTag}"></p>
        </div>
        <div>
            <label>苦手タグ(嫌うタグ)
                <select th:field="*{hateTag}">
                    <option value="">(選択してください)</option>
                    <option th:each="tag : ${T(com.example.demo.entity.EmotionTag).values()}" th:value="${tag}" th:text="${tag}"></option>
                </select>
            </label>
            <p th:if="${#fields.hasErrors('hateTag')}" th:errors="*{hateTag}"></p>
        </div>
        <div>
            <label>導入テキスト <textarea th:field="*{introText}"></textarea></label>
        </div>
        <div>
            <label>所属章
                <select th:field="*{chapterId}">
                    <option value="">(なし)</option>
                    <option th:each="chapter : ${chapters}" th:value="${chapter.id}"
                            th:text="${chapter.number} + '. ' + ${chapter.title}"></option>
                </select>
            </label>
        </div>

        <h2>反応テキスト</h2>
        <p>空欄の行は保存時に無視されます。</p>
        <div th:each="line, stat : *{reactionLines}">
            <label>種別
                <select th:field="*{reactionLines[__${stat.index}__].type}">
                    <option th:each="rt : ${T(com.example.demo.entity.ReactionType).values()}" th:value="${rt}" th:text="${rt}"></option>
                </select>
            </label>
            <label>テキスト
                <textarea th:field="*{reactionLines[__${stat.index}__].text}"></textarea>
            </label>
        </div>

        <button type="submit">保存</button>
    </form>
    <p><a th:href="@{/admin/npcs}">一覧に戻る</a></p>
</body>
</html>
