<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>区画編集 | 忘却の取引</title>
</head>
<body>
    <h1 th:text="${districtForm.id} != null ? '区画編集' : '区画新規作成'"></h1>
    <form th:action="${districtForm.id} != null ? @{/admin/districts/{id}(id=${districtForm.id})} : @{/admin/districts}"
          th:object="${districtForm}" method="post">
        <div>
            <label>区画名 <input type="text" th:field="*{name}"></label>
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>
        <div>
            <label>役割・雰囲気 <input type="text" th:field="*{role}"></label>
        </div>
        <div>
            <label>所属章
                <select th:field="*{chapterId}">
                    <option value="">(なし)</option>
                    <option th:each="chapter : ${chapters}" th:value="${chapter.id}"
                            th:text="${chapter.number} + '. ' + ${chapter.title}"></option>
                </select>
            </label>
        </div>
        <div>
            <label>担当NPC
                <select th:field="*{npcId}">
                    <option value="">(なし)</option>
                    <option th:each="npc : ${npcs}" th:value="${npc.id}" th:text="${npc.name}"></option>
                </select>
            </label>
        </div>
        <button type="submit">保存</button>
    </form>
    <p><a th:href="@{/admin/districts}">一覧に戻る</a></p>
</body>
</html>
