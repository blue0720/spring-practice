<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>区画管理 | 忘却の取引</title>
</head>
<body>
    <h1>区画管理</h1>
    <p><a th:href="@{/admin}">管理画面トップ</a></p>
    <p><a th:href="@{/admin/districts/new}">新規作成</a></p>
    <table border="1">
        <thead>
        <tr>
            <th>区画名</th>
            <th>役割・雰囲気</th>
            <th>所属章</th>
            <th>担当NPC</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="district : ${districts}">
            <td th:text="${district.name}"></td>
            <td th:text="${district.role}"></td>
            <td th:text="${district.chapterTitle}"></td>
            <td th:text="${district.npcName}"></td>
            <td>
                <a th:href="@{/admin/districts/{id}/edit(id=${district.id})}">編集</a>
                <form th:action="@{/admin/districts/{id}/delete(id=${district.id})}" method="post" style="display:inline">
                    <button type="submit" onclick="return confirm('削除しますか?');">削除</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</body>
</html>
