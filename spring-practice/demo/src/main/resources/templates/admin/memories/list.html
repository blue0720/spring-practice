<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>記憶断片管理 | 忘却の取引</title>
</head>
<body>
    <h1>記憶断片管理</h1>
    <p><a th:href="@{/admin}">管理画面トップ</a></p>
    <p><a th:href="@{/admin/memories/new}">新規作成</a></p>
    <table border="1">
        <thead>
        <tr>
            <th>感情タグ</th>
            <th>タイトル</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="memory : ${memories}">
            <td th:text="${memory.tag}"></td>
            <td th:text="${memory.title}"></td>
            <td>
                <a th:href="@{/admin/memories/{id}/edit(id=${memory.id})}">編集</a>
                <form th:action="@{/admin/memories/{id}/delete(id=${memory.id})}" method="post" style="display:inline">
                    <button type="submit" onclick="return confirm('削除しますか?');">削除</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</body>
</html>
