<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>会員登録 | 忘却の取引</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" th:href="@{/css/dq.css}">
</head>
<body>
<div class="dq-page">
    <div class="dq-panel">
        <h1>あたらしいぼうけんのしょ</h1>
        <div class="dq-window">
            <p class="dq-msg is-error" th:if="${errorMessage}" th:text="${errorMessage}"></p>
            <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                <label>ユーザー名 <input type="text" th:field="*{username}"></label>
                <p class="dq-msg is-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
                <label>メールアドレス <input type="email" th:field="*{email}"></label>
                <p class="dq-msg is-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                <label>パスワード <input type="password" th:field="*{password}"></label>
                <p class="dq-msg is-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                <button type="submit">この なまえで はじめる</button>
            </form>
        </div>
        <p class="dq-links"><a th:href="@{/login}">▶ ぼうけんのしょをひらく(ログイン)</a></p>
    </div>
</div>
</body>
</html>
