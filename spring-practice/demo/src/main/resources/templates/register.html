<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>会員登録 | 忘却の取引</title>
</head>
<body>
    <h1>会員登録</h1>
    <p th:if="${errorMessage}" th:text="${errorMessage}"></p>
    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
        <div>
            <label>ユーザー名 <input type="text" th:field="*{username}"></label>
            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
        </div>
        <div>
            <label>メールアドレス <input type="email" th:field="*{email}"></label>
            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        </div>
        <div>
            <label>パスワード <input type="password" th:field="*{password}"></label>
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        </div>
        <button type="submit">登録する</button>
    </form>
    <p><a th:href="@{/login}">ログインはこちら</a></p>
</body>
</html>
