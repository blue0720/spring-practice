<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン | 忘却の取引</title>
</head>
<body>
    <h1>ログイン</h1>
    <p th:if="${param.error}">ユーザー名またはパスワードが違います。</p>
    <p th:if="${param.logout}">ログアウトしました。</p>
    <p th:if="${param.registered}">登録が完了しました。ログインしてください。</p>
    <form th:action="@{/login}" method="post">
        <div>
            <label>ユーザー名 <input type="text" name="username"></label>
        </div>
        <div>
            <label>パスワード <input type="password" name="password"></label>
        </div>
        <button type="submit">ログイン</button>
    </form>
    <p><a th:href="@{/register}">新規登録はこちら</a></p>
</body>
</html>
